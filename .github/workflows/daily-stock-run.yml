name: Daily Stock Run

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  run-stock-bot:
    name: Run Stock Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit
        run: echo "Running commit $GITHUB_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Create .env from GitHub secret
        shell: bash
        run: |
          if [ -z "${{ secrets.ENV_FILE }}" ]; then
            echo "ENV_FILE secret is required for scheduled/manual runs."
            exit 1
          fi

          printf "%s" "${{ secrets.ENV_FILE }}" > .env

      - name: Run stock pipeline
        run: |
          uv run python - <<'PY'
          from app.services.stock_service import StockService

          result = StockService().run_pipeline(notify=True)
          print("Candidates scanned:", len(result.candidates))
          print("After filters:", len(result.filtered))
          print("Summary:")
          print(result.summary)
          PY
