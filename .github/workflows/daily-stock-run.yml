name: Daily Stock Run

on:
  push:
    branches:
      - production
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  run-stock-bot:
    name: Run Stock Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'production' || github.ref }}

      - name: Show commit
        run: echo "Running commit $GITHUB_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Create .env from GitHub secret
        shell: bash
        run: |
          if [ -z "${{ secrets.ENV_FILE }}" ]; then
            echo "ENV_FILE secret is required for scheduled/manual runs."
            exit 1
          fi

          printf "%s" "${{ secrets.ENV_FILE }}" > .env
          printf "\nENABLE_SCHEDULER=false\nAPP_HOST=127.0.0.1\nAPP_PORT=8000\n" >> .env

      - name: Start API
        run: |
          uv run python run.py > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time."
          cat app.log
          exit 1

      - name: Trigger stock pipeline
        run: |
          curl -fsS http://127.0.0.1:8000/run

      - name: Stop API
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
          if [ -f app.log ]; then
            cat app.log || true
          fi
