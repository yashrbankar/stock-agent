name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Test And Smoke Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Create .env
        shell: bash
        run: |
          if [ -n "${{ secrets.ENV_FILE }}" ]; then
            printf "%s" "${{ secrets.ENV_FILE }}" > .env
          else
            cp .env.example .env
          fi

      - name: Compile Python files
        run: uv run python -m compileall app run.py

      - name: Import smoke test
        run: uv run python -c "import app.main; print('app import ok')"

      - name: FastAPI health smoke test
        run: |
          uv run python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app

          client = TestClient(app)
          response = client.get("/health")
          assert response.status_code == 200, response.text
          assert response.json()["status"] == "ok", response.text
          print("health ok")
          PY

  deploy:
    name: Deploy Via Webhook
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && secrets.DEPLOY_WEBHOOK_URL != ''

    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
